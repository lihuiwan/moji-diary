name: Apply backup feature

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-backup-feature.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply backup feature patch
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/lihuiwan/moji-diary/9d266e40ffb4935fdd354c68950bc8da75075e49/.github/workflows/apply-backup-feature.yml" \
            | awk 'BEGIN{on=0} /cat > \/tmp\/moji-backup.patch <<'\''PATCH'\''/{on=1; next} on && /^PATCH$/{exit} on{print}' \
            > /tmp/moji-backup.patch
          test -s /tmp/moji-backup.patch
          git apply /tmp/moji-backup.patch
          rm -f .github/workflows/apply-backup-feature.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Add diary export and local backup controls"
          git push
