name: Apply backup feature

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-backup-feature.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply backup feature patch
        run: |
          cat > /tmp/moji-backup.patch <<'PATCH'
