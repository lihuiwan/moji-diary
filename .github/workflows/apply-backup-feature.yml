+const BACKUP_HANDLE_KEY = 'backup-directory';
+const AUTO_BACKUP_INTERVAL = 5 * 60 * 1000;
+
+const backupFileName = () => {
+  const stamp = new Date().toISOString().replace(/[:.]/g, '-');
+  return `moji-diary-backup-${stamp}.json`;
+};
+
+const backupPayload = entries => JSON.stringify({
+  app: 'moji-diary',
+  version: 1,
+  exportedAt: new Date().toISOString(),
+  entries,
+}, null, 2);
+
+const downloadTextFile = (filename, text) => {
+  const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
+  const url = URL.createObjectURL(blob);
+  const a = document.createElement('a');
+  a.href = url;
+  a.download = filename;
+  document.body.appendChild(a);
+  a.click();
+  a.remove();
+  URL.revokeObjectURL(url);
+};
+
+const openBackupDb = () => new Promise((resolve, reject) => {
+  const request = indexedDB.open(BACKUP_DB, 1);
+  request.onupgradeneeded = () => {
+    request.result.createObjectStore(BACKUP_STORE);
+  };
+  request.onsuccess = () => resolve(request.result);
+  request.onerror = () => reject(request.error);
+});
+
+const backupDbGet = async (key) => {
+  const db = await openBackupDb();
+  return new Promise((resolve, reject) => {
+    const tx = db.transaction(BACKUP_STORE, 'readonly');
+    const req = tx.objectStore(BACKUP_STORE).get(key);
+    req.onsuccess = () => resolve(req.result);
+    req.onerror = () => reject(req.error);
+    tx.oncomplete = () => db.close();
+  });
+};
+
+const backupDbSet = async (key, value) => {
+  const db = await openBackupDb();
+  return new Promise((resolve, reject) => {
+    const tx = db.transaction(BACKUP_STORE, 'readwrite');
+    tx.objectStore(BACKUP_STORE).put(value, key);
+    tx.oncomplete = () => {
+      db.close();
+      resolve();
+    };
+    tx.onerror = () => reject(tx.error);
+  });
+};
+
+const canUseDirectoryBackup = () => 'showDirectoryPicker' in window;
+
+const writeBackupToDirectory = async (dirHandle, entries) => {
+  const fileHandle = await dirHandle.getFileHandle(backupFileName(), { create: true });
+  const writable = await fileHandle.createWritable();
+  await writable.write(backupPayload(entries));
+  await writable.close();
+};
 
