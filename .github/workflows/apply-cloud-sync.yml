name: Apply cloud sync

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-cloud-sync.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply cloud sync patch
        run: |
          set -euo pipefail
          cat > /tmp/moji-cloud.patch.b64 <<'B64'

B64
          base64 -d /tmp/moji-cloud.patch.b64 > /tmp/moji-cloud.patch
          git apply /tmp/moji-cloud.patch
          npm install --package-lock-only
          rm -f .github/workflows/apply-cloud-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Add Supabase cloud sync"
          git push
